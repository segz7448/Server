name: Build PhantomBrowser APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=PhantomBrowser, OU=Debug, O=PhantomBrowser, L=Unknown, ST=Unknown, C=US"

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PHANTOM_STORE_FILE=app/debug.keystore \
            -PHANTOM_STORE_PASSWORD=android \
            -PHANTOM_KEY_ALIAS=androiddebugkey \
            -PHANTOM_KEY_PASSWORD=android \
            --no-daemon \
            --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhantomBrowser-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Get APK size
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK size: $SIZE"
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Create release summary
        run: |
          echo "## 📱 PhantomBrowser APK Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Release |" >> $GITHUB_STEP_SUMMARY
          echo "| Arch | arm64-v8a |" >> $GITHUB_STEP_SUMMARY
