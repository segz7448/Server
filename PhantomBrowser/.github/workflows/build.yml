name: Build PhantomBrowser APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd PhantomBrowser && yarn install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x PhantomBrowser/android/gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore PhantomBrowser/android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=PhantomBrowser,OU=Debug,O=PhantomBrowser,L=Unknown,ST=Unknown,C=US"

      - name: Bundle JS
        run: |
          mkdir -p PhantomBrowser/android/app/src/main/assets
          cd PhantomBrowser && npx react-native bundle \
            --platform android --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        run: |
          cd PhantomBrowser/android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhantomBrowser-release
          path: PhantomBrowser/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
